name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: npm install
      - run: npm run check
      - name: Run test suite
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee test-results.log
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-test-results
          path: test-results.log
          if-no-files-found: error
      - run: npm run compile:hermetica
      - run: test -s .codex/hermetica.project.json
      - run: node -e "const p=require('./.codex/hermetica.project.json'); if(p.profile!=='hermetica'||p.objects.length<3) process.exit(1)"
      - run: node apps/cli/dist/main.js compile reference/hermetica --output=.codex/hermetica.cli.json --json
      - run: test -s .codex/hermetica.cli.json
      - run: cmp .codex/hermetica.project.json .codex/hermetica.cli.json
      - run: npm run query:hermetica > .codex/hermetica.query.json
      - run: node -e "const q=require('./.codex/hermetica.query.json'); if(q.count!==1||q.objects[0].type!=='translation') process.exit(1)"
      - run: npm run doctor
      - run: npm run profiles:list
      - run: npm run profiles:inspect
      - run: npm run profiles:validate
      - run: npm run validate
      - run: npm run validate:strict
      - run: npm run validate:hermetica
      - run: npm run validate:json
      - run: npm run validate:sarif
      - run: test -s codex-results.sarif
      - name: Upload CODEX SARIF
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: codex-results.sarif
          category: codex-validator
      - run: "! npm run validate:schema-invalid"
      - run: npm run inspect
      - run: npm run inspect:json
      - run: npm run graph
      - run: npm run graph:dot
      - run: npm run graph:filtered
      - run: npm run graph:write
      - run: test -s codex-graph.dot
      - run: npm run diagnostics
      - run: npm run diagnostics:json
      - run: npm run release:prepare
      - run: npm run release:verify
      - run: npm run release:verify:json
      - run: npm run release:keygen
      - run: npm run release:sign
      - run: npm run release:signature-verify
      - run: npm run package:build
      - run: test -s codex-package-0.2.0/CHECKSUMS.sha256
      - run: test -s codex-package-0.2.0/bom.cdx.json
      - run: npm run package:verify
      - run: npm run package:verify:json
      - run: npm run package:unpack
      - run: cmp codex-package-0.2.0/manifest.json codex-unpacked-0.2.0/manifest.json
      - run: tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf codex-package-0.2.0.tgz -C codex-package-0.2.0 .
      - name: Upload portable CODEX package
        uses: actions/upload-artifact@v7
        with:
          name: codex-package-0.2.0
          path: |
            codex-package-0.2.0.tgz
            .codex-ci/manifest.sig.json
            .codex-ci/public.pem
          if-no-files-found: error
