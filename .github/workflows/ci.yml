name: CI

on:
  push:
  pull_request:

jobs:
  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm test
      - run: npm run doctor
      - run: npm run validate
      - run: npm run validate:strict
      - run: npm run validate:json
      - run: npm run inspect
      - run: npm run inspect:json
