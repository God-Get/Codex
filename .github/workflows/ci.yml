name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  windows-build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: npm install
      - run: npm run check
      - run: npm test

  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: npm install
      - run: mkdir -p .codex-ci
      - run: npm run check
      - run: npm test
      - run: npm run doctor
      - run: npm run authoring:compile
      - run: test -s examples/authoring/project.json
      - run: npm run authoring:compile:json > .codex-ci/authoring.json
      - run: test -s .codex-ci/authoring.json
      - run: npm run authoring:compile:raw
      - run: cmp examples/authoring/project.json examples/authoring/project.raw.json
      - run: node apps/cli/dist/index.js validate examples/authoring/project.json --profile=hermetica
      - run: npm run import:hermetica
      - run: test -s reference/hermetica/project.json
      - run: npm run import:hermetica:json > .codex-ci/hermetica-import.json
      - run: test -s .codex-ci/hermetica-import.json
      - run: npm run query:hermetica
      - run: npm run query:hermetica:json > .codex-ci/hermetica-query.json
      - run: test -s .codex-ci/hermetica-query.json
      - run: node apps/cli/dist/index.js validate reference/hermetica/project.json --profile=hermetica
      - run: npm run profiles:list
      - run: npm run profiles:inspect
      - run: npm run profiles:validate
      - run: npm run validate
      - run: npm run validate:strict
      - run: npm run validate:hermetica
      - run: npm run validate:json
      - run: npm run validate:sarif
      - run: test -s codex-results.sarif
      - name: Upload CODEX SARIF
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: codex-results.sarif
          category: codex-validator
      - run: "! npm run validate:schema-invalid"
      - run: npm run inspect
      - run: npm run inspect:json
      - run: npm run graph
      - run: npm run graph:dot
      - run: npm run graph:filtered
      - run: npm run graph:write
      - run: test -s codex-graph.dot
      - run: npm run diagnostics
      - run: npm run diagnostics:json
      - run: npm run release:prepare
      - run: npm run release:verify
      - run: npm run release:verify:json
      - run: npm run release:keygen
      - run: npm run release:sign
      - run: npm run release:signature-verify
      - run: npm run package:build
      - run: test -s codex-package-0.2.0/CHECKSUMS.sha256
      - run: test -s codex-package-0.2.0/bom.cdx.json
      - run: npm run package:verify
      - run: npm run package:verify:json
      - run: npm run package:unpack
      - run: cmp codex-package-0.2.0/manifest.json codex-unpacked-0.2.0/manifest.json
      - run: tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf codex-package-0.2.0.tgz -C codex-package-0.2.0 .
      - name: Upload complete CODEX 0.2 release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: codex-package-0.2.0
          path: |
            codex-package-0.2.0.tgz
            codex-package-0.2.0/CHECKSUMS.sha256
            releases/0.2.0/manifest.prepared.json
            .codex-ci/manifest.sig.json
            .codex-ci/public.pem
            .codex-ci/authoring.json
            .codex-ci/hermetica-import.json
            .codex-ci/hermetica-query.json
          if-no-files-found: error
