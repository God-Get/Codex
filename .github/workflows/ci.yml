name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm test
      - run: npm run doctor
      - run: npm run validate
      - run: npm run validate:strict
      - run: npm run validate:json
      - run: npm run validate:sarif
      - run: test -s codex-results.sarif
      - name: Upload CODEX SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: codex-results.sarif
          category: codex-validator
      - run: "! npm run validate:schema-invalid"
      - run: npm run inspect
      - run: npm run inspect:json
      - run: npm run graph
      - run: npm run graph:dot
      - run: npm run graph:filtered
      - run: npm run graph:write
      - run: test -s codex-graph.dot
      - run: npm run diagnostics
      - run: npm run diagnostics:json
      - run: npm run release:prepare
      - run: npm run release:verify
      - run: npm run release:verify:json
      - run: npm run package:build
      - run: test -s codex-package-0.1.0/CHECKSUMS.sha256
      - run: tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf codex-package-0.1.0.tgz -C codex-package-0.1.0 .
      - name: Upload portable CODEX package
        uses: actions/upload-artifact@v4
        with:
          name: codex-package-0.1.0
          path: codex-package-0.1.0.tgz
          if-no-files-found: error
